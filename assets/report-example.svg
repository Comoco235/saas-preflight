<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="680" viewBox="0 0 1040 680" font-family="DejaVu Sans, Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="dots2" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#1B2230"/>
    </pattern>
  </defs>

  <rect width="1040" height="680" rx="14" fill="#0B0F14"/>
  <rect width="1040" height="680" rx="14" fill="url(#dots2)"/>

  <!-- severity strip -->
  <rect x="0" y="0" width="260" height="6" fill="#F85149"/>
  <rect x="260" y="0" width="260" height="6" fill="#DB6D28"/>
  <rect x="520" y="0" width="260" height="6" fill="#D29922"/>
  <rect x="780" y="0" width="260" height="6" fill="#3FB950"/>

  <!-- header -->
  <text x="40" y="58" font-family="DejaVu Sans Mono, monospace" font-size="20" fill="#6E7681">saas-preflight report</text>
  <text x="40" y="96" font-size="30" font-weight="700" fill="#E6EDF3">Copyboost</text>
  <text x="40" y="124" font-family="DejaVu Sans Mono, monospace" font-size="16" fill="#8B949E">Next.js + Supabase + Stripe</text>

  <!-- verdict -->
  <rect x="40" y="146" width="960" height="70" rx="10" fill="#3FB950" fill-opacity="0.10" stroke="#3FB950" stroke-opacity="0.5"/>
  <text x="64" y="180" font-size="22" font-weight="700" fill="#3FB950">SAFE TO SHIP</text>
  <text x="64" y="204" font-size="16" fill="#C9D1D9">0 P0 on an already-hardened codebase. 2 real P1s found and fixed.</text>

  <!-- counts -->
  <g font-family="DejaVu Sans Mono, monospace">
    <g>
      <rect x="40" y="238" width="228" height="74" rx="10" fill="#161B22" stroke="#30363D"/>
      <rect x="40" y="238" width="228" height="4" rx="2" fill="#F85149"/>
      <text x="64" y="288" font-size="40" font-weight="700" fill="#E6EDF3">0</text>
      <text x="244" y="270" font-size="16" fill="#8B949E" text-anchor="end">P0</text>
      <text x="244" y="292" font-size="12" fill="#6E7681" text-anchor="end">ship blocker</text>
    </g>
    <g>
      <rect x="284" y="238" width="228" height="74" rx="10" fill="#161B22" stroke="#30363D"/>
      <rect x="284" y="238" width="228" height="4" rx="2" fill="#DB6D28"/>
      <text x="308" y="288" font-size="40" font-weight="700" fill="#E6EDF3">2</text>
      <text x="488" y="270" font-size="16" fill="#8B949E" text-anchor="end">P1</text>
      <text x="488" y="292" font-size="12" fill="#6E7681" text-anchor="end">fix this week</text>
    </g>
    <g>
      <rect x="528" y="238" width="228" height="74" rx="10" fill="#161B22" stroke="#30363D"/>
      <rect x="528" y="238" width="228" height="4" rx="2" fill="#D29922"/>
      <text x="552" y="288" font-size="40" font-weight="700" fill="#E6EDF3">1</text>
      <text x="732" y="270" font-size="16" fill="#8B949E" text-anchor="end">P2</text>
      <text x="732" y="292" font-size="12" fill="#6E7681" text-anchor="end">hardening</text>
    </g>
    <g>
      <rect x="772" y="238" width="228" height="74" rx="10" fill="#161B22" stroke="#30363D"/>
      <rect x="772" y="238" width="228" height="4" rx="2" fill="#3FB950"/>
      <text x="796" y="288" font-size="40" font-weight="700" fill="#E6EDF3">1</text>
      <text x="976" y="270" font-size="16" fill="#8B949E" text-anchor="end">P3</text>
      <text x="976" y="292" font-size="12" fill="#6E7681" text-anchor="end">hygiene</text>
    </g>
  </g>

  <!-- findings -->
  <text x="40" y="356" font-size="15" font-family="DejaVu Sans Mono, monospace" fill="#6E7681">FINDINGS</text>

  <g font-size="17">
    <!-- f1 -->
    <rect x="40" y="372" width="46" height="26" rx="6" fill="#DB6D28" fill-opacity="0.18" stroke="#DB6D28" stroke-opacity="0.5"/>
    <text x="63" y="390" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#DB6D28" text-anchor="middle">P1</text>
    <text x="100" y="385" font-weight="700" fill="#E6EDF3">SSRF in the URL scraper</text>
    <text x="100" y="408" font-size="15" fill="#8B949E">Reachable via DNS rebinding and encoded IPs. Fixed with a resolve-then-validate guard.</text>

    <!-- f2 -->
    <rect x="40" y="430" width="46" height="26" rx="6" fill="#DB6D28" fill-opacity="0.18" stroke="#DB6D28" stroke-opacity="0.5"/>
    <text x="63" y="448" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#DB6D28" text-anchor="middle">P1</text>
    <text x="100" y="443" font-weight="700" fill="#E6EDF3">Stripe webhook swallowed a failed grant</text>
    <text x="100" y="466" font-size="15" fill="#8B949E">A paying user could get no access. Fixed: return 500 and do not mark done, so Stripe retries.</text>

    <!-- f3 -->
    <rect x="40" y="488" width="46" height="26" rx="6" fill="#D29922" fill-opacity="0.18" stroke="#D29922" stroke-opacity="0.5"/>
    <text x="63" y="506" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#D29922" text-anchor="middle">P2</text>
    <text x="100" y="501" font-weight="700" fill="#E6EDF3">Duplicate testimonial race</text>
    <text x="100" y="524" font-size="15" fill="#8B949E">Concurrent inserts. Fixed with a UNIQUE constraint and a 409 conflict.</text>

    <!-- f4 -->
    <rect x="40" y="546" width="46" height="26" rx="6" fill="#3FB950" fill-opacity="0.18" stroke="#3FB950" stroke-opacity="0.5"/>
    <text x="63" y="564" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#3FB950" text-anchor="middle">P3</text>
    <text x="100" y="559" font-weight="700" fill="#E6EDF3">Spoofable client IP in logging</text>
    <text x="100" y="582" font-size="15" fill="#8B949E">X-Forwarded-For trusted blindly. Fixed with a hardened getClientIp.</text>
  </g>

  <!-- footer -->
  <line x1="40" y1="612" x2="1000" y2="612" stroke="#21262D"/>
  <text x="40" y="642" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#6E7681">Verified after fixes: typecheck clean, lint clean, 572 unit tests passing.</text>
</svg>
