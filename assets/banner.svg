<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" font-family="DejaVu Sans, Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#1B2230"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" fill="#0B0F14"/>
  <rect width="1280" height="360" fill="url(#dots)"/>

  <!-- severity strip P0..P3 -->
  <rect x="0" y="0" width="320" height="6" fill="#F85149"/>
  <rect x="320" y="0" width="320" height="6" fill="#DB6D28"/>
  <rect x="640" y="0" width="320" height="6" fill="#D29922"/>
  <rect x="960" y="0" width="320" height="6" fill="#3FB950"/>

  <!-- shield mark -->
  <g>
    <path d="M90,118 L124,131 L124,178 C124,210 109,229 90,242 C71,229 56,210 56,178 L56,131 Z"
          fill="#3FB950" fill-opacity="0.12" stroke="#3FB950" stroke-width="3"/>
    <path d="M74,180 L86,193 L108,160" fill="none" stroke="#3FB950" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- title -->
  <text x="166" y="170" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace"
        font-size="62" font-weight="700" fill="#E6EDF3">saas-preflight</text>

  <!-- tagline -->
  <text x="168" y="210" font-size="23" fill="#8B949E">Pre-ship security &amp; payment audit for vibe-coded SaaS</text>

  <!-- chips -->
  <g font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="18">
    <rect x="168" y="240" width="110" height="34" rx="17" fill="#161B22" stroke="#30363D"/>
    <text x="223" y="262" fill="#C9D1D9" text-anchor="middle">Next.js</text>

    <rect x="290" y="240" width="128" height="34" rx="17" fill="#161B22" stroke="#30363D"/>
    <text x="354" y="262" fill="#C9D1D9" text-anchor="middle">Supabase</text>

    <rect x="430" y="240" width="100" height="34" rx="17" fill="#161B22" stroke="#30363D"/>
    <text x="480" y="262" fill="#C9D1D9" text-anchor="middle">Stripe</text>
  </g>

  <!-- right-side severity legend -->
  <g font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="15" fill="#6E7681">
    <text x="1232" y="318" text-anchor="end">P0 ship blocker  /  P1 this week  /  P2 hardening  /  P3 hygiene</text>
  </g>
</svg>
